<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80">
  <style>
    text { font-family: monospace; font-size: 13px; fill: #58a6ff; }
    .f1,.f2,.f3,.f4 { animation: swap 1.2s steps(1) infinite; }
    .f1 { animation-delay: 0s; }
    .f2 { animation-delay: 0.3s; }
    .f3 { animation-delay: 0.6s; }
    .f4 { animation-delay: 0.9s; }
    @keyframes swap {
      0%   { opacity: 1; }
      25%  { opacity: 0; }
      100% { opacity: 0; }
    }
  </style>
  <g class="f1">
    <text x="60" y="20"> o</text>
    <text x="60" y="36">-|-</text>
    <text x="60" y="52"> |</text>
    <text x="60" y="68">/ \</text>
  </g>
  <g class="f2">
    <text x="60" y="20"> o</text>
    <text x="60" y="36">\|-</text>
    <text x="60" y="52"> |</text>
    <text x="60" y="68">/ \</text>
  </g>
  <g class="f3">
    <text x="60" y="20"> o</text>
    <text x="60" y="36">-|-</text>
    <text x="60" y="52"> |</text>
    <text x="60" y="68">/ \</text>
  </g>
  <g class="f4">
    <text x="60" y="20"> o</text>
    <text x="60" y="36">-|/</text>
    <text x="60" y="52"> |</text>
    <text x="60" y="68">/ \</text>
  </g>
</svg>